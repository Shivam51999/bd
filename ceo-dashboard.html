<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BD Dashboard — Mangalam Landmarks</title>
<style>
  :root {
    --navy: #1B2A4A;
    --navy-light: #2C4470;
    --gold: #C9A24B;
    --gold-light: #E0C374;
    --teal: #2F7A6F;
    --teal-light: #4A9B8E;
    --bg: #F5F3EE;
    --card: #FFFFFF;
    --ink: #1B2A4A;
    --ink-muted: #6B7280;
    --border: #E5E0D5;
    --red: #C0392B;
    --green: #2F7A6F;
    --amber: #C9A24B;
    --radius: 12px;
    --shadow: 0 2px 10px rgba(27,42,74,0.08);
    --shadow-lg: 0 10px 28px rgba(27,42,74,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  h1, h2, h3, .font-heading { font-family: 'Georgia', 'Times New Roman', serif; }

  .topbar {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    padding: 22px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-lg);
  }
  .topbar .brand { display: flex; align-items: center; gap: 14px; }
  .topbar .brand .badge {
    width: 42px; height: 42px; background: var(--gold); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; color: var(--navy); font-size: 20px; font-family: Georgia, serif;
  }
  .topbar h1 { font-size: 21px; font-weight: 600; }
  .topbar .subtitle { font-size: 12.5px; color: var(--gold-light); margin-top: 3px; }
  .topbar .right { text-align: right; }
  .topbar .date-badge { background: rgba(255,255,255,0.1); padding: 7px 14px; border-radius: 20px; font-size: 13px; color: var(--gold-light); }
  .topbar .refresh-note { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 6px; }

  .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px 60px; }

  .section-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--ink-muted); margin: 36px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label .line { flex: 1; height: 1px; background: var(--border); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
  .kpi-card {
    background: var(--card); border-radius: var(--radius); padding: 22px 24px;
    box-shadow: var(--shadow); border-left: 5px solid var(--gold);
  }
  .kpi-card.teal { border-left-color: var(--teal); }
  .kpi-card.navy { border-left-color: var(--navy); }
  .kpi-card .kpi-label { font-size: 12px; color: var(--ink-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi-card .kpi-value { font-size: 34px; font-weight: 700; color: var(--navy); margin: 8px 0 4px; font-family: Georgia, serif; }
  .kpi-card .kpi-sub { font-size: 12.5px; color: var(--ink-muted); }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 28px; margin-bottom: 4px; border: 1px solid var(--border); }
  .card-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 18px; }
  .card-title .as-of { font-size: 11px; color: var(--ink-muted); font-weight: 500; float: right; }

  .funnel-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
  .funnel-stage {
    flex: 1; min-width: 150px; border-radius: 12px; padding: 20px 16px; text-align: center; color: white;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  }
  .funnel-stage:nth-child(2) { background: linear-gradient(135deg, #2C4470, #3D5A8F); }
  .funnel-stage:nth-child(3) { background: linear-gradient(135deg, var(--teal), var(--teal-light)); }
  .funnel-stage:nth-child(4) { background: linear-gradient(135deg, var(--gold), #B8923D); color: var(--navy); }
  .funnel-stage .fs-count { font-size: 30px; font-weight: 700; font-family: Georgia, serif; }
  .funnel-stage .fs-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 5px; opacity: 0.9; }

  .progress-row { margin-bottom: 18px; }
  .progress-row .pr-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
  .progress-row .pr-label .name { font-weight: 700; color: var(--navy); }
  .progress-row .pr-label .val { color: var(--ink-muted); font-weight: 600; }
  .progress-bar-bg { background: #EFEBE2; border-radius: 7px; height: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, var(--teal), var(--teal-light)); transition: width 0.5s; }
  .progress-bar-fill.gold { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
  .progress-bar-fill.amber { background: var(--amber); }

  .quarter-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .quarter-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 700;
    border: 1px solid var(--border); background: white; color: var(--ink-muted); cursor: pointer;
  }
  .quarter-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th {
    text-align: left; padding: 11px 14px; background: #F5F3EE; color: var(--navy);
    font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .table-wrap { overflow-x: auto; }

  .badge { display: inline-block; padding: 4px 11px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .badge-sourcing { background: #E8EEF7; color: var(--navy); }
  .badge-evaluation { background: #FCF3DC; color: #8A6D1F; }
  .badge-negotiation { background: #FCE9DC; color: #B05A1F; }
  .badge-closed-signed { background: #E1F0EC; color: var(--teal); }
  .badge-closed-dropped { background: #F7E3E1; color: var(--red); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .stat-strip { display: flex; gap: 28px; flex-wrap: wrap; margin-top: 6px; padding-top: 16px; border-top: 1px solid var(--border); }
  .stat-strip .stat { font-size: 13px; color: var(--ink-muted); }
  .stat-strip .stat b { color: var(--navy); font-size: 16px; display: block; font-family: Georgia, serif; }

  .footer-note { text-align: center; font-size: 11.5px; color: var(--ink-muted); margin-top: 40px; }

  @media (max-width: 640px) {
    .topbar { padding: 16px 18px; flex-direction: column; align-items: flex-start; gap: 10px; }
    .container { padding: 18px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="badge">M</div>
    <div>
      <h1>Business Development — Executive Summary</h1>
      <div class="subtitle">Mangalam Landmarks · Land Acquisition Pipeline</div>
    </div>
  </div>
  <div class="right">
    <div class="date-badge" id="todayBadge">—</div>
    <div class="refresh-note" id="refreshNote">Loading…</div>
  </div>
</div>

<div class="container" id="dashboardRoot">
  <div class="empty-state"><div class="icon">⏳</div>Loading dashboard…</div>
</div>

<script src="ceo-dashboard.js"></script>
</body>
</html>
