<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BD Dashboard — Mangalam Landmarks</title>
<style>
  :root {
    --ink: #424242;
    --ink-light: #595959;
    --grey: #727272;
    --grey-soft: #9A9A9A;
    --red: #EA1D24;
    --red-deep: #C81017;
    --bg: #FAFAF9;
    --card: #FFFFFF;
    --border: #E6E4E1;
    --border-soft: #EFEDEA;
    --green: #3C7A5C;
    --amber: #B8862E;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(40,40,40,0.07), 0 1px 2px rgba(40,40,40,0.05);
    --shadow-lg: 0 10px 28px rgba(40,40,40,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: 'Georgia', 'Times New Roman', serif; }

  .topbar {
    background: var(--card);
    color: var(--ink);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand { display: flex; align-items: center; gap: 16px; }
  .topbar .logo-img { height: 44px; width: auto; display: block; }
  .topbar .brand-divider { width: 1px; height: 36px; background: var(--border); }
  .topbar .brand-text h1 { font-size: 19px; font-weight: 700; color: var(--ink); font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; }
  .topbar .brand-text .subtitle {
    font-size: 11.5px; color: var(--grey); margin-top: 3px;
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  .topbar .right { text-align: right; display: flex; align-items: center; gap: 14px; }
  .topbar .date-badge { background: var(--bg); border: 1px solid var(--border); padding: 7px 14px; border-radius: 20px; font-size: 13px; color: var(--grey); }
  .topbar .refresh-note { font-size: 11px; color: var(--grey-soft); margin-top: 6px; }
  .topbar .search-btn {
    background: var(--ink); color: white; border: none; border-radius: 20px;
    padding: 9px 16px; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .topbar .search-btn:hover { background: var(--ink-light); }

  .container { max-width: 1280px; margin: 0 auto; padding: 32px 28px 60px; }

  .section-label {
    font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--grey); margin: 36px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label .line { flex: 1; height: 1px; background: var(--border); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }
  .kpi-card {
    background: var(--card); border-radius: var(--radius); padding: 22px 24px;
    box-shadow: var(--shadow); border-left: 4px solid var(--red);
  }
  .kpi-card.alt { border-left-color: var(--ink); }
  .kpi-card.alt2 { border-left-color: var(--grey-soft); }
  .kpi-card .kpi-label { font-size: 11.5px; color: var(--grey); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
  .kpi-card .kpi-value { font-size: 34px; font-weight: 700; color: var(--ink); margin: 8px 0 4px; font-family: Georgia, serif; }
  .kpi-card .kpi-sub { font-size: 12.5px; color: var(--grey); }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 28px; margin-bottom: 4px; border: 1px solid var(--border-soft); }
  .card-title { font-size: 16.5px; font-weight: 700; color: var(--ink); margin-bottom: 18px; }
  .card-title .as-of { font-size: 11px; color: var(--grey); font-weight: 500; float: right; }

  .funnel-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
  .funnel-stage {
    flex: 1; min-width: 150px; border-radius: 10px; padding: 20px 16px; text-align: center; color: white;
    background: var(--ink);
  }
  .funnel-stage:nth-child(2) { background: var(--ink-light); }
  .funnel-stage:nth-child(3) { background: var(--grey); }
  .funnel-stage:nth-child(4) { background: var(--red); }
  .funnel-stage .fs-count { font-size: 30px; font-weight: 700; font-family: Georgia, serif; }
  .funnel-stage .fs-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; margin-top: 5px; opacity: 0.92; }

  .progress-row { margin-bottom: 18px; }
  .progress-row .pr-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
  .progress-row .pr-label .name { font-weight: 700; color: var(--ink); }
  .progress-row .pr-label .val { color: var(--grey); font-weight: 600; }
  .progress-bar-bg { background: var(--border-soft); border-radius: 7px; height: 11px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 7px; background: var(--ink); transition: width 0.5s; }
  .progress-bar-fill.gold { background: var(--amber); }
  .progress-bar-fill.amber { background: var(--amber); }

  .quarter-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .quarter-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 700;
    border: 1px solid var(--border); background: white; color: var(--grey); cursor: pointer;
  }
  .quarter-tab.active { background: var(--ink); color: white; border-color: var(--ink); }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th {
    text-align: left; padding: 11px 14px; background: var(--bg); color: var(--ink);
    font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
  .table-wrap { overflow-x: auto; }

  .badge { display: inline-block; padding: 4px 11px; border-radius: 12px; font-size: 10.5px; font-weight: 700; white-space: nowrap; letter-spacing: 0.3px; }
  .badge-sourcing { background: #EFEFEF; color: var(--ink); }
  .badge-evaluation { background: #FBF1DD; color: #8A6D1F; }
  .badge-negotiation { background: #FBE6D9; color: #B05A1F; }
  .badge-closed-signed { background: #E3F0E9; color: var(--green); }
  .badge-closed-dropped { background: #FAE3E2; color: var(--red-deep); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--grey); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .stat-strip { display: flex; gap: 28px; flex-wrap: wrap; margin-top: 6px; padding-top: 16px; border-top: 1px solid var(--border-soft); }
  .stat-strip .stat { font-size: 13px; color: var(--grey); }
  .stat-strip .stat b { color: var(--ink); font-size: 16px; display: block; font-family: Georgia, serif; }

  .footer-note { text-align: center; font-size: 11.5px; color: var(--grey-soft); margin-top: 40px; letter-spacing: 0.2px; }

  /* ---------- DEAL CARDS (Pipeline) ---------- */
  .deal-card {
    background: var(--card); border: 1px solid var(--border-soft); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .deal-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .deal-card-title { font-size: 15.5px; font-weight: 700; color: var(--ink); font-family: Georgia, serif; }
  .deal-card-sub { font-size: 12px; color: var(--grey); margin-top: 3px; }
  .deal-card-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px 18px; padding-top: 12px; border-top: 1px solid var(--border-soft);
  }
  .dcg-label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--grey-soft); font-weight: 700; }
  .dcg-val { display: block; font-size: 13px; color: var(--ink); margin-top: 2px; }
  .timeline-link {
    display: inline-block; margin-top: 14px; background: none; border: none;
    color: var(--red); font-size: 12.5px; font-weight: 700; cursor: pointer; padding: 0;
  }
  .timeline-link:hover { color: var(--red-deep); }
  .doc-status-link {
    display: inline-block; margin-top: 8px; margin-left: 14px; background: none; border: none;
    color: var(--ink); font-size: 12.5px; font-weight: 700; cursor: pointer; padding: 0;
  }
  .doc-status-link:hover { color: var(--ink-light); }

  /* ---------- TIMELINE MODAL ---------- */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(40,40,40,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: white; border-radius: var(--radius); max-width: 560px; width: 100%;
    max-height: 80vh; overflow-y: auto; padding: 24px; box-shadow: var(--shadow-lg);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-header h3 { color: var(--ink); font-size: 16px; font-family: Georgia, serif; }
  .modal-close { cursor: pointer; font-size: 20px; color: var(--grey); background: none; border: none; }
  .timeline-list { position: relative; padding-left: 22px; }
  .timeline-item { position: relative; padding-bottom: 20px; border-left: 2px solid var(--border); padding-left: 18px; margin-left: 4px; }
  .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }
  .timeline-dot { position: absolute; left: -5px; top: 2px; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .timeline-dot.activity { background: var(--ink); }
  .timeline-date { font-size: 11px; color: var(--grey-soft); text-transform: uppercase; letter-spacing: 0.3px; }
  .timeline-transition { font-size: 13.5px; color: var(--ink); margin-top: 2px; }
  .timeline-followup { font-size: 11.5px; color: var(--red); margin-top: 3px; }

  /* ---------- DOCUMENT MODAL (CEO view) ---------- */
  .doc-category-ceo { margin-bottom: 18px; }
  .doc-category-ceo-title {
    font-size: 11.5px; font-weight: 700; color: var(--ink); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .doc-row-ceo { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 0; font-size: 13px; }

  /* ---------- SEARCH PANEL ---------- */
  .search-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(40,40,40,0.55); z-index: 1100; align-items: flex-start; justify-content: center; padding: 60px 20px;
  }
  .search-overlay.active { display: flex; }
  .search-box { background: white; border-radius: var(--radius); max-width: 620px; width: 100%; max-height: 75vh; overflow-y: auto; padding: 24px; box-shadow: var(--shadow-lg); }
  .search-input-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .search-input-row input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
  .search-type-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-type-btn { padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); background: white; color: var(--grey); cursor: pointer; }
  .search-type-btn.active { background: var(--ink); color: white; border-color: var(--ink); }
  .search-result-card { border: 1px solid var(--border-soft); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .search-result-name { font-weight: 700; font-size: 14px; color: var(--ink); }
  .search-result-meta { font-size: 12px; color: var(--grey); margin-top: 3px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: white;
    padding: 12px 20px; border-radius: 8px;
    box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 600;
    z-index: 2000; opacity: 0; transform: translateY(10px);
    transition: all 0.25s;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--red-deep); }

  @media (max-width: 640px) {
    .topbar { padding: 16px 18px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .topbar .logo-img { height: 34px; }
    .topbar .right { width: 100%; justify-content: space-between; }
    .container { padding: 18px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img class="logo-img" id="brandLogo" alt="Mangalam Landmarks">
    <div class="brand-divider"></div>
    <div class="brand-text">
      <h1>Business Development — Executive Summary</h1>
      <div class="subtitle">Land Acquisition Pipeline</div>
    </div>
  </div>
  <div class="right">
    <button class="search-btn" id="openSearchBtn">🔍 Search Contacts</button>
    <div>
      <div class="date-badge" id="todayBadge">—</div>
      <div class="refresh-note" id="refreshNote">Loading…</div>
    </div>
  </div>
</div>

<div class="container" id="dashboardRoot">
  <div class="empty-state"><div class="icon">⏳</div>Loading dashboard…</div>
</div>

<!-- ============ TIMELINE MODAL (read-only) ============ -->
<div class="modal-overlay" id="timelineModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="timelineModalTitle">Activity Timeline</h3>
      <button class="modal-close" id="timelineModalClose" onclick="closeTimelineModal()">&times;</button>
    </div>
    <div id="timelineModalBody"></div>
  </div>
</div>

<!-- ============ DOCUMENT STATUS MODAL (read-only, view/download links) ============ -->
<div class="modal-overlay" id="ceoDocumentModal">
  <div class="modal-box" style="max-width:640px;">
    <div class="modal-header">
      <h3 id="ceoDocumentModalTitle">Documents</h3>
      <button class="modal-close" id="ceoDocumentModalClose" onclick="closeCeoDocumentModal()">&times;</button>
    </div>
    <div id="ceoDocumentModalBody"></div>
  </div>
</div>

<!-- ============ CONTACT SEARCH PANEL ============ -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <div class="modal-header">
      <h3>Search Contacts</h3>
      <button class="modal-close" id="searchCloseBtn" onclick="closeSearchPanel()">&times;</button>
    </div>
    <div class="search-input-row">
      <input type="text" id="searchContactInput" placeholder="Search by name, phone, or notes…">
    </div>
    <div class="search-type-filters" id="searchTypeFilters"></div>
    <div id="searchResultsBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  document.getElementById('brandLogo').src = 'LOGO_SRC_PLACEHOLDER';
</script>
<script src="ceo-dashboard.js"></script>
</body>
</html>
